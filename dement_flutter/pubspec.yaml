name: dement_flutter
description: Dement - Dementia Care Assistant App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  just_audio: ^0.9.38

  # State Management
  provider: ^6.1.2

  # HTTP & API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Image Picker
  image_picker: ^1.1.2

  # Voice & Audio
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2
  audioplayers: ^6.0.0

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # File
  file_picker: ^8.0.3
  path_provider: ^2.1.4
  mime: ^1.0.6
  http_parser: ^4.0.2

  geolocator: ^12.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
